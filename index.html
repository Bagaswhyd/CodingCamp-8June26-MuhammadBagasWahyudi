<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expense & Budget Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-theme="light">
  <div class="app-container">
    <header class="header">
      <h1>Expense & Budget Visualizer</h1>
      <button id="theme-toggle" class="btn-theme" type="button">
        🌙 Dark Mode
      </button>
    </header>

    <section class="balance-section">
      <h2>Total Balance</h2>
      <p id="total-income">Rp 0</p>
      <p id="total-expenses">Rp 0</p>
      <p id="net-balance">Rp 0</p>
    </section>

    <section class="chart-section">
      <h2>Spending by Category</h2>
      <div class="chart-wrapper">
        <canvas id="expense-chart"></canvas>
      </div>
    </section>

    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form" class="transaction-form">
        <div class="form-group">
          <label for="transaction-type">Transaction Type</label>
          <select id="transaction-type" name="type" required>
            <option value="">-- Select Type --</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <span class="field-error" id="error-transaction-type" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input
            type="text"
            id="item-name"
            name="itemName"
            placeholder="e.g. Lunch"
            required
          />
          <span class="field-error" id="error-item-name" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="amount">Amount (Rp)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            placeholder="0"
            min="0"
            step="1"
            required
          />
          <span class="field-error" id="error-amount" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="transaction-date">Date</label>
          <input
            type="date"
            id="transaction-date"
            name="date"
            required
          />
          <span class="field-error" id="error-transaction-date" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">-- Select Category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
            <!-- kategori custom akan ditambah via JS -->
          </select>
          <span class="field-error" id="error-category" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="custom-category">Custom Category (optional)</label>
          <input
            type="text"
            id="custom-category"
            name="customCategory"
            placeholder="e.g. Coffee"
          />
        </div>

        <button type="submit" class="btn-primary">Add Transaction</button>
      </form>
    </section>

    <section class="list-section">
      <h2>Transactions</h2>

      <div class="list-controls">
        <label for="sort-by">Sort by:</label>
        <select id="sort-by">
          <option value="date">Date (newest)</option>
          <option value="amount-asc">Amount (low to high)</option>
          <option value="amount-desc">Amount (high to low)</option>
        </select>

        <label for="limit-input">Highlight if over limit (Rp):</label>
        <input
          type="number"
          id="limit-input"
          placeholder="e.g. 100000"
          min="0"
        />
      </div>

      <ul id="transaction-list" class="transaction-list">
        <!-- transaksi akan diisi JS -->
      </ul>
    </section>
    <div id="error-container" class="error-notification" role="alert" aria-live="polite"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
